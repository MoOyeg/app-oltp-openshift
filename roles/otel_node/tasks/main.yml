---
# Guarded by `when: otel_daemonset_enabled` in site.yml. design.md sec 3.3
# treats this as opt-in because of the added privilege/footprint.
- name: SCC binding for the node-local DaemonSet collector
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'scc-rbac.yaml.j2') }}"

- name: Deploy the DaemonSet-mode node collector (node-local only)
  kubernetes.core.k8s:
    state: present
    apply: true
    definition: "{{ lookup('template', 'collector.yaml.j2') }}"

- name: Wait for the node collector DaemonSet to be ready on all nodes
  kubernetes.core.k8s_info:
    api_version: apps/v1
    kind: DaemonSet
    namespace: "{{ observability_namespace }}"
    label_selectors:
      - "app.kubernetes.io/component=opentelemetry-collector"
      - "app.kubernetes.io/instance={{ observability_namespace }}.{{ otel_node_name }}"
  register: _ds
  retries: 24
  delay: 10
  until: >
    _ds.resources | length > 0 and
    (_ds.resources[0].status.numberReady | default(0)) | int ==
    (_ds.resources[0].status.desiredNumberScheduled | default(-1)) | int and
    (_ds.resources[0].status.desiredNumberScheduled | default(0)) | int > 0

- name: Admin-scoped ServiceMonitor for host/kubelet metrics
  kubernetes.core.k8s:
    state: present
    definition: "{{ lookup('template', 'servicemonitor.yaml.j2') }}"
  when: platform_telemetry_enabled | bool

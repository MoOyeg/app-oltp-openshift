# Uber-jar so the S2I run script has a single runnable artifact.
quarkus.package.jar.type=uber-jar

# Datasource: db-kind fixed; URL/credentials come from env at runtime
# (QUARKUS_DATASOURCE_* set by the Deployment). JDBC telemetry ON so DB
# calls become spans inside the app trace (design.md sec 3.3).
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.telemetry=true
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# OTLP endpoint/protocol/service.name come from env (OTEL_* / QUARKUS_OTEL_*).
# Always-on at the SDK edge; real keep/drop is the gateway tail_sampling.
quarkus.otel.traces.sampler=parentbased_always_on

# Application metrics via OpenTelemetry (design.md sec 3.3 "collect once"):
# Micrometer meters + JVM/HTTP metrics are exported over the SAME OTLP
# channel to the gateway collector - NO Prometheus scrape endpoint.
quarkus.otel.metrics.enabled=true
